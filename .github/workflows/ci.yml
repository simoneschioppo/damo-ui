name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect whether the PR touches code that needs e2e validation.
  # Docs-only changes (markdown, .gitignore) skip the e2e job entirely.
  # Push events to main ALWAYS run e2e regardless (full regression coverage).
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      # Third-party action — pinned to the v3 tag's commit SHA for supply-chain
      # safety. To update: `gh api repos/dorny/paths-filter/git/ref/tags/v3 | jq .object.sha`.
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'apps/**'
              - 'e2e/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build lib
        run: pnpm build

      - name: Upload lib build
        uses: actions/upload-artifact@v4
        with:
          name: damo-ui-dist
          path: packages/ui/dist
          retention-days: 1
          if-no-files-found: error

      - name: Typecheck
        run: pnpm --filter @damo/ui typecheck && pnpm --filter @damo/web typecheck

      - name: Unit tests
        run: pnpm test

  # React 18 smoke test — peer dependency says `react >=18` but local dev runs
  # React 19. This job re-installs the workspace with React 18 pinned through
  # pnpm overrides and re-runs the lib's typecheck + unit tests. Catches any
  # React-19-only API that accidentally leaks into the published surface.
  # Audit M-2.
  react-18-smoke:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Force React 18 via pnpm overrides
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.pnpm = p.pnpm || {};
            p.pnpm.overrides = {
              'react': '^18.3.0',
              'react-dom': '^18.3.0',
              '@types/react': '^18.3.0',
              '@types/react-dom': '^18.3.0',
            };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "

      - name: Install with React 18
        run: pnpm install --no-frozen-lockfile

      - name: Confirm React 18 resolved
        run: |
          node -e "
            const v = require('react/package.json').version;
            console.log('React:', v);
            if (!v.startsWith('18.')) {
              console.error('Expected React 18.x, got ' + v);
              process.exit(1);
            }
          "

      - name: Lib typecheck (React 18)
        run: pnpm --filter damo-ui typecheck

      - name: Lib unit tests (React 18)
        run: pnpm --filter damo-ui test

  # PR runs use chromium only — webkit on shared GHA runners is documented-flaky
  # (see the 9 `test.skip(browserName === 'webkit', ...)` sites in e2e/tests/).
  # Cross-browser coverage runs nightly via .github/workflows/e2e-nightly.yml.
  e2e:
    runs-on: ubuntu-latest
    needs: [lint-and-test, changes]
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download lib build
        uses: actions/download-artifact@v4
        with:
          name: damo-ui-dist
          path: packages/ui/dist

      - name: Cache Playwright browsers (chromium only)
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser (chromium only on PR)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @damo/e2e exec playwright install chromium

      - name: Install Playwright system deps (chromium only)
        run: pnpm --filter @damo/e2e exec playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx', 'apps/web/**/*.css', 'pnpm-lock.yaml') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Build web (production)
        run: pnpm --filter @damo/web build

      - name: Run e2e (chromium, prewarm via global-setup)
        run: pnpm --filter @damo/e2e test:chromium

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
