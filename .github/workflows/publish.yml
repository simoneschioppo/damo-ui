name: Publish

on:
  push:
    tags:
      - 'damo-ui@*'

jobs:
  publish:
    # Disabled until Phase 5 (#82) — soft-launch on public npm as damo-ui@0.4.0.
    # Flip `if: false` → `if: true` and provision an NPM_TOKEN repo secret first.
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build lib
        run: pnpm --filter damo-ui build

      - name: Publish to npm
        run: pnpm --filter damo-ui publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
