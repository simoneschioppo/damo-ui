name: Publish

on:
  push:
    tags:
      - 'damo-ui@*'

jobs:
  publish:
    # Disabled until first launch — soft-launch on public npm as damo-ui@0.3.0
    # (current version in packages/ui/package.json).
    # To enable: (1) flip `if: false` → `if: true`, (2) provision an NPM_TOKEN
    # repo secret with publish scope, (3) flip the GitHub repo to public so the
    # absolute README banner URL on npmjs.com resolves.
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build lib
        run: pnpm --filter damo-ui build

      - name: Publish to npm
        run: pnpm --filter damo-ui publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
