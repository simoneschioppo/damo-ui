name: Publish

# Publishes the damo-ui packages on a release tag (e.g. `v1.0.0`):
#   - @axologic/ui   (the component library)
#   - damo-ui        (the CLI — the bare name post-1.0 cutover)
#   - @axologic/mcp  (the MCP server)
#
# NOTE: NODE_AUTH_TOKEN (secrets.NPM_TOKEN) must be an npm token with publish
# rights for BOTH the `@axologic` scope and the `damo-ui` package. The 0.x
# token was scoped to `damo-ui` only — update it before tagging v1.0.0.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter @axologic/ui build

      - name: Publish @axologic/ui
        run: pnpm --filter @axologic/ui publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish damo-ui (CLI)
        run: pnpm --filter damo-ui publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @axologic/mcp
        run: pnpm --filter @axologic/mcp publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
